version: '3.8'

services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_db
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: app_user
      APP_USER_PASSWORD: app_pass
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neighbourly_network
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./backend/migrations:/container-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neighbourly_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: oracle_db
      DB_PORT: 1521
      DB_NAME: xe
      DB_USER: app_user
      DB_PASSWORD: app_pass
      JWT_SECRET: SafeAndSecure
      JWT_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "3000:3000"
    depends_on:
      oracle_db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - neighbourly_network


volumes:
  oracle_data:
    driver: local

networks:
  neighbourly_network:
    driver: bridge