services:
  postgres:
    image: postgres:16-alpine
    container_name: neighbourly_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-neighbourly_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-neighbourly_pass_2024}
      POSTGRES_DB: ${DB_NAME:-neighbourly_db}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-neighbourly_user} -d ${DB_NAME:-neighbourly_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neighbourly_network
    command: 
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neighbourly_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - neighbourly_network


volumes:
  postgres_data:
    driver: local

networks:
  neighbourly_network:
    driver: bridge
