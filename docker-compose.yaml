version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: neighbourly_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: neighbourly_user
      POSTGRES_PASSWORD: neighbourly_pass_2024
      POSTGRES_DB: neighbourly_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neighbourly_user -d neighbourly_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neighbourly_network
    command: 
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neighbourly_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      RESEND_API_KEY: <Your-API-Key>
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: neighbourly_db
      DB_USER: neighbourly_user
      DB_PASSWORD: neighbourly_pass_2024
      JWT_SECRET: SafeAndSecure
      JWT_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 12
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - neighbourly_network


volumes:
  postgres_data:
    driver: local

networks:
  neighbourly_network:
    driver: bridge
