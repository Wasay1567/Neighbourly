name: Deploy Backend

on:
  push:
    branches:
      - main
      
  pull_request:
    branches:
      - main
    types:
      - closed
  
  

jobs:

  deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            set -e

            cd $HOME/Neighbourly || {
              git clone https://github.com/Wasay1567/Neighbourly.git $HOME/Neighbourly
              cd $HOME/Neighbourly
            }

            # Update code
            git fetch origin
            git reset --hard origin/main

            # Always update env
            echo "${{ secrets.ENV_FILE }}" > .env

            # Check migration changes
            if git diff --name-only HEAD~1 HEAD | grep -qE 'migrations'; then
              echo "Migration changes detected → full reset"
              docker compose down -v
              docker compose up -d --build
            else
              echo "No migration changes → updating backend only"
              docker compose up -d --build backend
            fi